name: Zork I Glulx Upstream Baseline

on:
  push:
    branches:
      - agent/preservation-first-optimized-edition
    paths:
      - "glulx/provenance.json"
      - "glulx/tools/**"
      - ".github/workflows/glulx-upstream-baseline.yml"
  pull_request:
    paths:
      - "glulx/provenance.json"
      - "glulx/tools/**"
      - ".github/workflows/glulx-upstream-baseline.yml"

permissions:
  contents: read

env:
  ZORK_GLULX_COMMIT: 1ada70e58ac4933446b907d67949d9cab3119c0e
  ZILF_COMMIT: 45c60f1e37651f266ac92d49ae01748bb4909fa5
  GLAZER_TAG: v1.2.0
  GLAZER_COMMIT: 1cc80bcdefb4b4125185e1170eb1ee178e97ff5a
  GLAZER_SOURCE_URL: https://gitlab.com/andwj/glazer/-/archive/v1.2.0/glazer-v1.2.0.tar.gz
  GLAZER_SOURCE_SHA256: a45edadb140111b5df44a3f49ca4e2b8ec0550d63a6cdee7c93bec93a79ed482
  GLULXE_COMMIT: 56ab8743bab565de307bd892c555d8d8897ed517
  CHEAPGLK_COMMIT: 14d8aaf6e4150669762bd4646a5368e75c1eeee6
  UPSTREAM_RELEASE: "1"
  UPSTREAM_SERIAL: "251203"
  EXPECTED_ARTIFACT_SHA256: 15dd2b654693e4f1c63e09a2308de1f366913c13be080baa33af3f76c5679ac8
  EXPECTED_ARCHIVE_SHA256: 6e9879f36d7d15ddebee1333244be016a9f3a40756718292264815e8881c51ad
  EXPECTED_ARCHIVE_STORY_SHA256: 42b74ce1ce32e9f483418409642b1be425e66e93c7741961e90917e2bb30b129

jobs:
  unchanged-upstream-glulx:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check out pinned upstream Zork Glulx source
        uses: actions/checkout@v4
        with:
          repository: taradinoc/zork1
          ref: ${{ env.ZORK_GLULX_COMMIT }}
          path: .upstream/zork1-glulx
          persist-credentials: false

      - name: Check out pinned ZILF source
        uses: actions/checkout@v4
        with:
          repository: taradinoc/zilf
          ref: ${{ env.ZILF_COMMIT }}
          path: .tooling/zilf
          persist-credentials: false

      - name: Check out pinned Glulxe
        uses: actions/checkout@v4
        with:
          repository: erkyrath/glulxe
          ref: ${{ env.GLULXE_COMMIT }}
          path: .tooling/glulxe
          persist-credentials: false

      - name: Check out pinned CheapGlk
        uses: actions/checkout@v4
        with:
          repository: erkyrath/cheapglk
          ref: ${{ env.CHEAPGLK_COMMIT }}
          path: .tooling/cheapglk
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev curl unzip

      - name: Validate immutable provenance pins
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = json.loads(Path('glulx/provenance.json').read_text())
          assert p['source']['commit'] == '${{ env.ZORK_GLULX_COMMIT }}'
          assert p['toolchain']['zilf']['commit'] == '${{ env.ZILF_COMMIT }}'
          assert p['toolchain']['glazer']['release'] == '${{ env.GLAZER_TAG }}'
          assert p['toolchain']['glazer']['commit'] == '${{ env.GLAZER_COMMIT }}'
          assert p['toolchain']['glazer']['source_url'] == '${{ env.GLAZER_SOURCE_URL }}'
          assert p['toolchain']['glazer']['source_sha256'] == '${{ env.GLAZER_SOURCE_SHA256 }}'
          assert p['toolchain']['glulxe']['commit'] == '${{ env.GLULXE_COMMIT }}'
          assert p['toolchain']['glk']['commit'] == '${{ env.CHEAPGLK_COMMIT }}'
          assert p['edition']['source_release'] == int('${{ env.UPSTREAM_RELEASE }}')
          assert p['edition']['source_serial'] == '${{ env.UPSTREAM_SERIAL }}'
          assert p['expected_artifact']['sha256'] == '${{ env.EXPECTED_ARTIFACT_SHA256 }}'
          assert p['archive_reference']['archive_sha256'] == '${{ env.EXPECTED_ARCHIVE_SHA256 }}'
          assert p['archive_reference']['story_sha256'] == '${{ env.EXPECTED_ARCHIVE_STORY_SHA256 }}'
          assert p['source']['local_modifications'] == []
          PY

      - name: Build pinned ZILF
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p glulx/build
          pushd .tooling/zilf
          dotnet restore Zilf.sln --nologo 2>&1 | tee ../../glulx/build/zilf-restore.log
          dotnet build Zilf.sln --configuration Release --property:PortableTarget=true --no-restore --nologo \
            2>&1 | tee ../../glulx/build/zilf-build.log
          popd
          zilf_dll="$(find .tooling/zilf -path '*/bin/Release/*/zilf.dll' -print -quit)"
          test -n "$zilf_dll"
          echo "ZILF_DLL=$(realpath "$zilf_dll")" >> "$GITHUB_ENV"

      - name: Build exactly pinned Glazer
        shell: bash
        run: |
          set -euxo pipefail
          curl --fail --location --silent --show-error "$GLAZER_SOURCE_URL" \
            --output glulx/build/glazer-source.tar.gz
          echo "$GLAZER_SOURCE_SHA256  glulx/build/glazer-source.tar.gz" | sha256sum --check
          mkdir -p .tooling/glazer-source
          tar -xf glulx/build/glazer-source.tar.gz --strip-components=1 -C .tooling/glazer-source
          make -C .tooling/glazer-source 2>&1 | tee glulx/build/glazer-build.log
          glazer_binary="$(find .tooling/glazer-source -type f -name glazer -perm -111 -print -quit)"
          test -n "$glazer_binary"
          echo "GLAZER_BIN=$(realpath "$glazer_binary")" >> "$GITHUB_ENV"
          "$glazer_binary" --version 2>&1 | tee glulx/build/glazer-version.txt
          grep -Fx "glazer 1.2.0" glulx/build/glazer-version.txt

      - name: Inspect pinned archived zork1-glulx.zip
        shell: bash
        run: |
          set -euxo pipefail
          curl --fail --location --silent --show-error \
            'https://ifarchive.org/if-archive/games/glulx/zork1-glulx.zip' \
            --output glulx/build/zork1-glulx-archive.zip
          python - <<'PY'
          import hashlib, json, os, zipfile
          from pathlib import Path
          archive = Path('glulx/build/zork1-glulx-archive.zip')
          archive_sha = hashlib.sha256(archive.read_bytes()).hexdigest()
          if archive_sha != os.environ['EXPECTED_ARCHIVE_SHA256']:
              raise SystemExit(f'archive SHA-256 drift: {archive_sha}')
          entries = []
          ulx_members = []
          with zipfile.ZipFile(archive) as zf:
              for info in zf.infolist():
                  if info.is_dir():
                      continue
                  data = zf.read(info.filename)
                  entry = {
                      'name': info.filename,
                      'size_bytes': len(data),
                      'sha256': hashlib.sha256(data).hexdigest(),
                  }
                  entries.append(entry)
                  if info.filename.lower().endswith('.ulx'):
                      ulx_members.append((info.filename, data, entry))
          if len(ulx_members) != 1:
              raise SystemExit(f'expected exactly one .ulx member, found {len(ulx_members)}')
          member_name, member_data, member_entry = ulx_members[0]
          if member_entry['sha256'] != os.environ['EXPECTED_ARCHIVE_STORY_SHA256']:
              raise SystemExit(f'archive story SHA-256 drift: {member_entry["sha256"]}')
          Path('glulx/build/zork1-glulx-archive.ulx').write_bytes(member_data)
          manifest = {
              'archive_sha256': archive_sha,
              'archive_size_bytes': archive.stat().st_size,
              'story_member': member_name,
              'entries': entries,
          }
          Path('glulx/build/archive-manifest.json').write_text(json.dumps(manifest, indent=2) + '\n')
          PY
          python glulx/tools/verify_ulx.py glulx/build/zork1-glulx-archive.ulx \
            --expect-sha256 "$EXPECTED_ARCHIVE_STORY_SHA256" \
            --json glulx/build/archive-story-report.json

      - name: Compile unchanged source and normalize published serial
        shell: bash
        run: |
          set -euxo pipefail
          assembly="${GITHUB_WORKSPACE}/glulx/build/zork1-glulx-upstream.asm"
          pushd .upstream/zork1-glulx
          dotnet "$ZILF_DLL" build --glulx --stop-after-compile zork1.zil "$assembly" \
            2>&1 | tee "${GITHUB_WORKSPACE}/glulx/build/zork1-glulx-compile.log"
          popd
          python - <<'PY'
          import json, re
          from pathlib import Path
          path = Path('glulx/build/zork1-glulx-upstream.asm')
          text = path.read_text()
          pattern = re.compile(r'(metadata_serial:\s*\n\s*db\s+")([0-9]{6})(")')
          match = pattern.search(text)
          if match is None:
              raise SystemExit('generated Glulx metadata serial was not found')
          before = match.group(2)
          text, count = pattern.subn(r'\g<1>251203\g<3>', text)
          if count != 1:
              raise SystemExit(f'expected one metadata serial replacement, got {count}')
          path.write_text(text)
          receipt = {
              'generated_serial_before': before,
              'generated_serial_after': '251203',
              'replacement_count': count,
              'source_modified': False,
              'generated_assembly_modified': True,
          }
          Path('glulx/build/SERIAL-NORMALIZATION.json').write_text(json.dumps(receipt, indent=2) + '\n')
          PY
          "$GLAZER_BIN" "$assembly" -o glulx/build/zork1-glulx-upstream.ulx \
            2>&1 | tee glulx/build/glazer-assemble.log
          test -s glulx/build/zork1-glulx-upstream.ulx

      - name: Verify fail-closed repository artifact
        run: |
          python glulx/tools/verify_ulx.py glulx/build/zork1-glulx-upstream.ulx \
            --expect-sha256 "$EXPECTED_ARTIFACT_SHA256" \
            --json glulx/build/glulx-story-report.json

      - name: Build pinned native Glulxe with CheapGlk
        shell: bash
        run: |
          set -euxo pipefail
          make -C .tooling/cheapglk 2>&1 | tee glulx/build/cheapglk-build.log
          make -C .tooling/glulxe \
            GLKDIR="${GITHUB_WORKSPACE}/.tooling/cheapglk" \
            GLKLIB="${GITHUB_WORKSPACE}/.tooling/cheapglk/libcheapglk.a" \
            2>&1 | tee glulx/build/glulxe-build.log
          test -x .tooling/glulxe/glulxe

      - name: Run native baseline and archive identity smoke tests
        shell: bash
        run: |
          set -o pipefail
          printf 'look\ninventory\nquit\ny\n' | .tooling/glulxe/glulxe glulx/build/zork1-glulx-upstream.ulx \
            2>&1 | tee glulx/build/smoke-transcript.txt
          grep -F "Release $UPSTREAM_RELEASE / Serial number $UPSTREAM_SERIAL" glulx/build/smoke-transcript.txt
          grep -F "West of House" glulx/build/smoke-transcript.txt
          grep -F "mailbox" glulx/build/smoke-transcript.txt
          printf 'look\nquit\ny\n' | .tooling/glulxe/glulxe glulx/build/zork1-glulx-archive.ulx \
            2>&1 | tee glulx/build/archive-smoke-transcript.txt
          grep -F "Release $UPSTREAM_RELEASE / Serial number $UPSTREAM_SERIAL" glulx/build/archive-smoke-transcript.txt
          grep -F "West of House" glulx/build/archive-smoke-transcript.txt

      - name: Write licensing and qualified build receipts
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          def digest(path):
              return hashlib.sha256(path.read_bytes()).hexdigest()
          def license_entry(root):
              matches = sorted(p for p in root.rglob('*') if p.is_file() and p.name.lower().startswith(('license', 'copying')))
              if not matches:
                  raise SystemExit(f'no license file found under {root}')
              return [{'path': str(p), 'sha256': digest(p)} for p in matches]
          manifest = json.loads(Path('glulx/provenance.json').read_text())
          archive = json.loads(Path('glulx/build/archive-manifest.json').read_text())
          story = json.loads(Path('glulx/build/glulx-story-report.json').read_text())
          archive_story = json.loads(Path('glulx/build/archive-story-report.json').read_text())
          receipt = {
              'qualification_status': 'qualified unchanged-upstream baseline',
              'identity': {'release': 1, 'serial': '251203'},
              'source_commit': manifest['source']['commit'],
              'zilf_commit': manifest['toolchain']['zilf']['commit'],
              'glazer': manifest['toolchain']['glazer'],
              'glulxe_commit': manifest['toolchain']['glulxe']['commit'],
              'cheapglk_commit': manifest['toolchain']['glk']['commit'],
              'source_modified': False,
              'generated_assembly_normalization': json.loads(Path('glulx/build/SERIAL-NORMALIZATION.json').read_text()),
              'artifact': story,
              'artifact_pin_matched': story['sha256'] == manifest['expected_artifact']['sha256'],
              'archive_artifact': archive_story,
              'archive': archive,
          }
          if not receipt['artifact_pin_matched']:
              raise SystemExit('qualified artifact did not match provenance pin')
          Path('glulx/build/BUILD-RECEIPT.json').write_text(json.dumps(receipt, indent=2) + '\n')
          licenses = {
              'zork_source': license_entry(Path('.upstream/zork1-glulx')),
              'zilf': license_entry(Path('.tooling/zilf')),
              'glazer': license_entry(Path('.tooling/glazer-source')),
              'glulxe': license_entry(Path('.tooling/glulxe')),
              'cheapglk': license_entry(Path('.tooling/cheapglk')),
          }
          Path('glulx/build/LICENSE-MANIFEST.json').write_text(json.dumps(licenses, indent=2) + '\n')
          PY

      - name: Upload qualified unchanged upstream baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zork1-glulx-unchanged-upstream
          path: |
            glulx/build/zork1-glulx-upstream.ulx
            glulx/build/zork1-glulx-upstream.asm
            glulx/build/glulx-story-report.json
            glulx/build/BUILD-RECEIPT.json
            glulx/build/LICENSE-MANIFEST.json
            glulx/build/SERIAL-NORMALIZATION.json
            glulx/build/smoke-transcript.txt
            glulx/build/zork1-glulx-compile.log
            glulx/build/glazer-assemble.log
            glulx/build/zilf-restore.log
            glulx/build/zilf-build.log
            glulx/build/glazer-build.log
            glulx/build/glazer-version.txt
            glulx/build/cheapglk-build.log
            glulx/build/glulxe-build.log
            glulx/build/zork1-glulx-archive.zip
            glulx/build/archive-manifest.json
            glulx/build/archive-story-report.json
            glulx/build/archive-smoke-transcript.txt
            glulx/provenance.json
          if-no-files-found: warn
