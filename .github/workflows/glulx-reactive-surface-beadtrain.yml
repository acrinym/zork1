name: Zork I Glulx Reactive Surface Beadtrain

on:
  push:
    branches:
      - agent/glulx-release121-reactive-surface
    paths:
      - ".beads/issues*.jsonl"
      - ".beads/onyx_zork_glulx_reactive_surface.beadtrain"
      - ".beads/beadtrains/scripts/validate_sharded_beadtrain.py"
      - ".github/workflows/glulx-reactive-surface-beadtrain.yml"
  pull_request:
    paths:
      - ".beads/issues*.jsonl"
      - ".beads/onyx_zork_glulx_reactive_surface.beadtrain"
      - ".beads/beadtrains/scripts/validate_sharded_beadtrain.py"
      - ".github/workflows/glulx-reactive-surface-beadtrain.yml"

permissions:
  contents: read

jobs:
  validate-reactive-surface-train:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate sharded Release 1212 train
        run: |
          python .beads/beadtrains/scripts/validate_sharded_beadtrain.py \
            .beads/onyx_zork_glulx_reactive_surface.beadtrain
