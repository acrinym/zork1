name: Zork I Glulx Ritual Resonance Beadtrain

on:
  push:
    branches:
      - agent/shadow-logic-ritual-mechanisms
    paths:
      - ".beads/onyx_zork_glulx_ritual_resonance.beadtrain"
      - ".beads/issues*.jsonl"
      - ".beads/beadtrains/scripts/validate_sharded_beadtrain.py"
      - ".github/workflows/glulx-ritual-resonance-beadtrain.yml"
  pull_request:
    paths:
      - ".beads/onyx_zork_glulx_ritual_resonance.beadtrain"
      - ".beads/issues*.jsonl"
      - ".beads/beadtrains/scripts/validate_sharded_beadtrain.py"
      - ".github/workflows/glulx-ritual-resonance-beadtrain.yml"

permissions:
  contents: read

jobs:
  validate-glulx-ritual-resonance-train:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate sharded Release 1216 train
        run: |
          python .beads/beadtrains/scripts/validate_sharded_beadtrain.py \
            .beads/onyx_zork_glulx_ritual_resonance.beadtrain
