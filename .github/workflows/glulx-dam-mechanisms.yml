name: Zork I Glulx Dam Mechanisms

on:
  push:
    branches:
      - agent/glulx-dam-control-mechanisms
    paths:
      - "glulx/dam-mechanisms/**"
      - "glulx/absurd-alternates/**"
      - "glulx/shadow-logic/**"
      - "glulx/reactive-surface/**"
      - "glulx/assistance/**"
      - "glulx/optimized/**"
      - "glulx/tools/**"
      - "optimized/**"
      - ".github/workflows/glulx-dam-mechanisms.yml"
  pull_request:
    paths:
      - "glulx/dam-mechanisms/**"
      - "glulx/absurd-alternates/**"
      - "glulx/shadow-logic/**"
      - "glulx/reactive-surface/**"
      - "glulx/assistance/**"
      - "glulx/optimized/**"
      - "glulx/tools/**"
      - "optimized/**"
      - ".github/workflows/glulx-dam-mechanisms.yml"

permissions:
  contents: read

env:
  ZORK_GLULX_COMMIT: 1ada70e58ac4933446b907d67949d9cab3119c0e
  ZORK_GLULX_TREE: 02b34128649bbb7fcddf99136e03fb67c032b089
  ZILF_COMMIT: 45c60f1e37651f266ac92d49ae01748bb4909fa5
  GLAZER_SOURCE_URL: https://gitlab.com/andwj/glazer/-/archive/v1.2.0/glazer-v1.2.0.tar.gz
  GLAZER_SOURCE_SHA256: a45edadb140111b5df44a3f49ca4e2b8ec0550d63a6cdee7c93bec93a79ed482
  GLULXE_COMMIT: 56ab8743bab565de307bd892c555d8d8897ed517
  CHEAPGLK_COMMIT: 14d8aaf6e4150669762bd4646a5368e75c1eeee6
  BASE_RELEASE: "1214"
  BASE_ARTIFACT_SHA256: 10ea136e389aef8bf9e629ea854ea97ba69f1e5df3b9024540abc91cc61f0628
  DAM_RELEASE: "1215"
  DAM_SERIAL: "260720"
  DAM_TEST_SERIAL: "990215"

jobs:
  qualify-dam-mechanisms:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check out pinned Tara Glulx source
        uses: actions/checkout@v4
        with:
          repository: taradinoc/zork1
          ref: ${{ env.ZORK_GLULX_COMMIT }}
          path: .upstream/zork1-glulx
          persist-credentials: false

      - name: Check out pinned ZILF source
        uses: actions/checkout@v4
        with:
          repository: taradinoc/zilf
          ref: ${{ env.ZILF_COMMIT }}
          path: .tooling/zilf
          persist-credentials: false

      - name: Check out pinned Glulxe
        uses: actions/checkout@v4
        with:
          repository: erkyrath/glulxe
          ref: ${{ env.GLULXE_COMMIT }}
          path: .tooling/glulxe
          persist-credentials: false

      - name: Check out pinned CheapGlk
        uses: actions/checkout@v4
        with:
          repository: erkyrath/cheapglk
          ref: ${{ env.CHEAPGLK_COMMIT }}
          path: .tooling/cheapglk
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev curl
          mkdir -p glulx/build/dam-mechanisms

      - name: Validate Release 1215 layer and qualified base
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          layer = json.loads(Path('glulx/dam-mechanisms/patch-series.json').read_text(encoding='utf-8'))
          base = json.loads(Path('glulx/absurd-alternates/patch-series.json').read_text(encoding='utf-8'))
          artifact = layer['expected_artifact']
          assert layer['release'] == int(os.environ['DAM_RELEASE'])
          assert layer['serial'] == os.environ['DAM_SERIAL']
          assert layer['upstream_commit'] == os.environ['ZORK_GLULX_COMMIT']
          assert layer['upstream_tree'] == os.environ['ZORK_GLULX_TREE']
          assert layer['base_release'] == int(os.environ['BASE_RELEASE'])
          assert layer['base_artifact_sha256'] == os.environ['BASE_ARTIFACT_SHA256']
          assert base['release'] == int(os.environ['BASE_RELEASE'])
          assert base['expected_artifact']['sha256'] == os.environ['BASE_ARTIFACT_SHA256']
          assert layer['expected_changed_paths'] == [
              '1dungeon.zil', 'assistance.zil', 'dam_mechanisms.zil',
              'shadow_logic.zil', 'zork1.zil',
          ]
          assert artifact['file'] == 'zork1-glulx-dam-mechanisms.ulx'
          assert artifact['glulx_version_hex'] == '0x00030103'
          assert artifact['size_bytes'] == 0
          assert artifact['checksum_hex'] == 'DISCOVERY'
          assert artifact['sha256'] == 'DISCOVERY'
          PY

      - name: Build pinned ZILF
        shell: bash
        run: |
          set -euxo pipefail
          pushd .tooling/zilf
          dotnet restore Zilf.sln --nologo 2>&1 | tee ../../glulx/build/dam-mechanisms/zilf-restore.log
          dotnet build Zilf.sln --configuration Release --property:PortableTarget=true --no-restore --nologo \
            2>&1 | tee ../../glulx/build/dam-mechanisms/zilf-build.log
          popd
          zilf_dll="$(find .tooling/zilf -path '*/bin/Release/*/zilf.dll' -print -quit)"
          test -n "$zilf_dll"
          echo "ZILF_DLL=$(realpath "$zilf_dll")" >> "$GITHUB_ENV"

      - name: Build exactly pinned Glazer
        shell: bash
        run: |
          set -euxo pipefail
          curl --fail --location --silent --show-error "$GLAZER_SOURCE_URL" \
            --output glulx/build/dam-mechanisms/glazer-source.tar.gz
          echo "$GLAZER_SOURCE_SHA256  glulx/build/dam-mechanisms/glazer-source.tar.gz" | sha256sum --check
          mkdir -p .tooling/glazer-source
          tar -xf glulx/build/dam-mechanisms/glazer-source.tar.gz --strip-components=1 -C .tooling/glazer-source
          make -C .tooling/glazer-source 2>&1 | tee glulx/build/dam-mechanisms/glazer-build.log
          glazer_binary="$(find .tooling/glazer-source -type f -name glazer -perm -111 -print -quit)"
          test -n "$glazer_binary"
          echo "GLAZER_BIN=$(realpath "$glazer_binary")" >> "$GITHUB_ENV"
          "$glazer_binary" --version | tee glulx/build/dam-mechanisms/glazer-version.txt
          grep -Fx "glazer 1.2.0" glulx/build/dam-mechanisms/glazer-version.txt

      - name: Stage and audit exact Release 1215 source
        run: |
          python glulx/tools/stage_dam_mechanisms.py \
            --upstream .upstream/zork1-glulx \
            --destination glulx/build/dam-mechanisms/src \
            --allowed-root glulx/build/dam-mechanisms \
            --manifest glulx/dam-mechanisms/patch-series.json
          python optimized/tools/zil_smell_check.py \
            --source glulx/build/dam-mechanisms/src \
            --json glulx/build/dam-mechanisms/smell-report.json
          python - <<'PY'
          import json
          from pathlib import Path
          receipt = json.loads(Path('glulx/build/dam-mechanisms/src/STAGING-RECEIPT.json').read_text(encoding='utf-8'))
          report = json.loads(Path('glulx/build/dam-mechanisms/smell-report.json').read_text(encoding='utf-8'))
          assert receipt['base']['release'] == 1214
          assert receipt['base']['artifact_sha256'] == '10ea136e389aef8bf9e629ea854ea97ba69f1e5df3b9024540abc91cc61f0628'
          assert receipt['changed_paths'] == [
              '1dungeon.zil', 'assistance.zil', 'dam_mechanisms.zil',
              'shadow_logic.zil', 'zork1.zil',
          ]
          assert not report['errors']
          assert not [item for item in report['includes'] if not item['resolved']]
          source = Path('glulx/build/dam-mechanisms/src')
          assert (source / 'dam_mechanisms.zil').is_file()
          assert not (source / 'dam_mech_test.zil').exists()
          assert not any('DAMRESET' in path.read_text(errors='ignore') for path in source.glob('*.zil'))
          PY

      - name: Compile discovery Release 1215 artifact
        shell: bash
        run: |
          set -euxo pipefail
          assembly="${GITHUB_WORKSPACE}/glulx/build/dam-mechanisms/zork1-glulx-dam-mechanisms.asm"
          pushd glulx/build/dam-mechanisms/src
          dotnet "$ZILF_DLL" build --glulx --stop-after-compile zork1.zil "$assembly" \
            2>&1 | tee "${GITHUB_WORKSPACE}/glulx/build/dam-mechanisms/zilf-compile.log"
          popd
          python glulx/tools/normalize_serial.py "$assembly" \
            --serial "$DAM_SERIAL" \
            --receipt glulx/build/dam-mechanisms/SERIAL-NORMALIZATION.json
          "$GLAZER_BIN" "$assembly" -o glulx/build/dam-mechanisms/zork1-glulx-dam-mechanisms.ulx \
            2>&1 | tee glulx/build/dam-mechanisms/glazer-assemble.log

      - name: Measure discovery artifact identity
        run: |
          python glulx/tools/verify_ulx.py glulx/build/dam-mechanisms/zork1-glulx-dam-mechanisms.ulx \
            --json glulx/build/dam-mechanisms/story-report.json
          python - <<'PY'
          import json
          from pathlib import Path
          story = json.loads(Path('glulx/build/dam-mechanisms/story-report.json').read_text(encoding='utf-8'))
          assert story['version_hex'] == '0x00030103'
          assert story['checksum_valid'] is True
          print('DISCOVERED_DAM_IDENTITY=' + json.dumps(story, sort_keys=True))
          PY

      - name: Build pinned native Glulxe with CheapGlk
        shell: bash
        run: |
          set -euxo pipefail
          make -C .tooling/cheapglk 2>&1 | tee glulx/build/dam-mechanisms/cheapglk-build.log
          make -C .tooling/glulxe \
            GLKDIR="${GITHUB_WORKSPACE}/.tooling/cheapglk" \
            GLKLIB="${GITHUB_WORKSPACE}/.tooling/cheapglk/libcheapglk.a" \
            2>&1 | tee glulx/build/dam-mechanisms/glulxe-build.log
          test -x .tooling/glulxe/glulxe
          echo "GLULXE_BIN=$(realpath .tooling/glulxe/glulxe)" >> "$GITHUB_ENV"

      - name: Build test-only dam scenario story
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf glulx/build/dam-mechanisms/test-src
          cp -a glulx/build/dam-mechanisms/src glulx/build/dam-mechanisms/test-src
          cp glulx/dam-mechanisms/tests/dam_mech_test.zil glulx/build/dam-mechanisms/test-src/dam_mech_test.zil
          python - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path('glulx/tools').resolve()))
          from stage_release120 import apply_patch
          apply_patch(
              Path('glulx/dam-mechanisms/tests/001-include-dam-test.json').resolve(),
              Path('glulx/build/dam-mechanisms/test-src').resolve(),
          )
          PY
          assembly="${GITHUB_WORKSPACE}/glulx/build/dam-mechanisms/zork1-glulx-dam-mechanisms-test.asm"
          pushd glulx/build/dam-mechanisms/test-src
          dotnet "$ZILF_DLL" build --glulx --stop-after-compile zork1.zil "$assembly" \
            2>&1 | tee "${GITHUB_WORKSPACE}/glulx/build/dam-mechanisms/test-zilf-compile.log"
          popd
          python glulx/tools/normalize_serial.py "$assembly" \
            --serial "$DAM_TEST_SERIAL" \
            --receipt glulx/build/dam-mechanisms/TEST-SERIAL-NORMALIZATION.json
          "$GLAZER_BIN" "$assembly" -o glulx/build/dam-mechanisms/zork1-glulx-dam-mechanisms-test.ulx \
            2>&1 | tee glulx/build/dam-mechanisms/test-glazer-assemble.log

      - name: Run dam mechanism and consequence route
        shell: bash
        run: |
          set -o pipefail
          "$GLULXE_BIN" glulx/build/dam-mechanisms/zork1-glulx-dam-mechanisms-test.ulx \
            < glulx/dam-mechanisms/tests/mechanism_commands.txt \
            2>&1 | tee glulx/build/dam-mechanisms/mechanism-transcript.txt
          while IFS= read -r marker; do
            test -z "$marker" || grep -F "$marker" glulx/build/dam-mechanisms/mechanism-transcript.txt
          done < glulx/dam-mechanisms/tests/mechanism_expectations.txt

      - name: Write discovery qualification receipt
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          stage = json.loads(Path('glulx/build/dam-mechanisms/src/STAGING-RECEIPT.json').read_text(encoding='utf-8'))
          story = json.loads(Path('glulx/build/dam-mechanisms/story-report.json').read_text(encoding='utf-8'))
          serial = json.loads(Path('glulx/build/dam-mechanisms/SERIAL-NORMALIZATION.json').read_text(encoding='utf-8'))
          receipt = {
              'qualification_status': 'discovery routes passed; artifact identity awaits committed lock',
              'identity': {'release': int(os.environ['DAM_RELEASE']), 'serial': os.environ['DAM_SERIAL']},
              'base': stage['base'],
              'changed_paths': stage['changed_paths'],
              'artifact': story,
              'serial_normalization': serial,
              'routes': {
                  'panel_diagnostics': 'passed',
                  'button_interlock': 'passed',
                  'canonical_wrench_and_bolt_gate_cycle': 'passed',
                  'melzar_dam_diagnostic': 'passed',
                  'red_light_control': 'passed',
                  'blue_button_real_leak': 'passed',
                  'wrong_tool_leak_feedback': 'passed',
                  'real_putty_repair': 'passed',
                  'persistent_recap': 'passed',
              },
              'production_contains_test_setup': False,
              'canonical_dam_timing_replaced': False,
          }
          Path('glulx/build/dam-mechanisms/BUILD-RECEIPT.json').write_text(
              json.dumps(receipt, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload discovery artifact and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zork1-glulx-dam-mechanisms-discovery
          path: |
            glulx/build/dam-mechanisms/zork1-glulx-dam-mechanisms.ulx
            glulx/build/dam-mechanisms/zork1-glulx-dam-mechanisms.asm
            glulx/build/dam-mechanisms/story-report.json
            glulx/build/dam-mechanisms/BUILD-RECEIPT.json
            glulx/build/dam-mechanisms/SERIAL-NORMALIZATION.json
            glulx/build/dam-mechanisms/TEST-SERIAL-NORMALIZATION.json
            glulx/build/dam-mechanisms/src/STAGING-RECEIPT.json
            glulx/build/dam-mechanisms/smell-report.json
            glulx/build/dam-mechanisms/mechanism-transcript.txt
            glulx/build/dam-mechanisms/*-compile.log
            glulx/build/dam-mechanisms/*-build.log
            glulx/build/dam-mechanisms/glazer-version.txt
            glulx/dam-mechanisms/patch-series.json
          if-no-files-found: warn
