name: Zork I Glulx Dam Mechanisms Beadtrain

on:
  push:
    branches:
      - agent/glulx-dam-control-mechanisms
    paths:
      - ".beads/onyx_zork_glulx_dam_mechanisms.beadtrain"
      - ".beads/issues*.jsonl"
      - "glulx/tools/validate_sharded_beadtrain.py"
      - ".github/workflows/glulx-dam-mechanisms-beadtrain.yml"
  pull_request:
    paths:
      - ".beads/onyx_zork_glulx_dam_mechanisms.beadtrain"
      - ".beads/issues*.jsonl"
      - "glulx/tools/validate_sharded_beadtrain.py"
      - ".github/workflows/glulx-dam-mechanisms-beadtrain.yml"

permissions:
  contents: read

jobs:
  validate-glulx-dam-mechanisms-train:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate sharded Release 1215 train
        run: |
          python glulx/tools/validate_sharded_beadtrain.py \
            .beads/onyx_zork_glulx_dam_mechanisms.beadtrain
