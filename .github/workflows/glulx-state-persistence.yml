name: Zork I Glulx State Persistence

on:
  push:
    branches:
      - agent/glulx-state-persistence
    paths:
      - "glulx/state-persistence/**"
      - "glulx/ritual-resonance/**"
      - "glulx/dam-mechanisms/**"
      - "glulx/absurd-alternates/**"
      - "glulx/shadow-logic/**"
      - "glulx/reactive-surface/**"
      - "glulx/assistance/**"
      - "glulx/optimized/**"
      - "glulx/tools/**"
      - ".github/workflows/glulx-state-persistence.yml"
  pull_request:
    paths:
      - "glulx/state-persistence/**"
      - "glulx/ritual-resonance/**"
      - "glulx/dam-mechanisms/**"
      - "glulx/absurd-alternates/**"
      - "glulx/shadow-logic/**"
      - "glulx/reactive-surface/**"
      - "glulx/assistance/**"
      - "glulx/optimized/**"
      - "glulx/tools/**"
      - ".github/workflows/glulx-state-persistence.yml"

permissions:
  contents: read

env:
  ZORK_GLULX_COMMIT: 1ada70e58ac4933446b907d67949d9cab3119c0e
  ZORK_GLULX_TREE: 02b34128649bbb7fcddf99136e03fb67c032b089
  GLULX_ZILF_COMMIT: 45c60f1e37651f266ac92d49ae01748bb4909fa5
  GLAZER_SOURCE_URL: https://gitlab.com/andwj/glazer/-/archive/v1.2.0/glazer-v1.2.0.tar.gz
  GLAZER_SOURCE_SHA256: a45edadb140111b5df44a3f49ca4e2b8ec0550d63a6cdee7c93bec93a79ed482
  GLULXE_COMMIT: 56ab8743bab565de307bd892c555d8d8897ed517
  CHEAPGLK_COMMIT: 14d8aaf6e4150669762bd4646a5368e75c1eeee6
  RITUAL_RELEASE: "1216"
  RITUAL_SERIAL: "260720"
  RITUAL_SIZE: "211968"
  RITUAL_CHECKSUM: "0x3d27d123"
  RITUAL_SHA256: 4f406e656b892feb5224e4e52afb98768417e1e761918334dfa94595e6091db2
  PERSIST_TEST_SERIAL: "990217"

jobs:
  qualify-glulx-state-persistence:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check out pinned Tara Glulx source
        uses: actions/checkout@v4
        with:
          repository: taradinoc/zork1
          ref: ${{ env.ZORK_GLULX_COMMIT }}
          path: .upstream/zork1-glulx
          persist-credentials: false

      - name: Check out pinned Glulx ZILF source
        uses: actions/checkout@v4
        with:
          repository: taradinoc/zilf
          ref: ${{ env.GLULX_ZILF_COMMIT }}
          path: .tooling/zilf-glulx
          persist-credentials: false

      - name: Check out pinned Glulxe
        uses: actions/checkout@v4
        with:
          repository: erkyrath/glulxe
          ref: ${{ env.GLULXE_COMMIT }}
          path: .tooling/glulxe
          persist-credentials: false

      - name: Check out pinned CheapGlk
        uses: actions/checkout@v4
        with:
          repository: erkyrath/cheapglk
          ref: ${{ env.CHEAPGLK_COMMIT }}
          path: .tooling/cheapglk
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install build and interpreter prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev curl
          mkdir -p glulx/build/state-persistence

      - name: Validate exact Release 1216 qualification boundary
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          qualification = json.loads(Path('glulx/state-persistence/qualification.json').read_text(encoding='utf-8'))
          ritual = json.loads(Path('glulx/ritual-resonance/patch-series.json').read_text(encoding='utf-8'))
          assert qualification['production_release'] == int(os.environ['RITUAL_RELEASE'])
          assert qualification['production_serial'] == os.environ['RITUAL_SERIAL']
          assert qualification['production_size_bytes'] == int(os.environ['RITUAL_SIZE'])
          assert qualification['production_checksum_hex'] == os.environ['RITUAL_CHECKSUM']
          assert qualification['production_sha256'] == os.environ['RITUAL_SHA256']
          assert qualification['production_source_changes'] == []
          assert ritual['release'] == int(os.environ['RITUAL_RELEASE'])
          assert ritual['serial'] == os.environ['RITUAL_SERIAL']
          assert ritual['expected_artifact']['size_bytes'] == int(os.environ['RITUAL_SIZE'])
          assert ritual['expected_artifact']['checksum_hex'] == os.environ['RITUAL_CHECKSUM']
          assert ritual['expected_artifact']['sha256'] == os.environ['RITUAL_SHA256']
          PY

      - name: Build pinned Glulx ZILF
        shell: bash
        run: |
          set -euxo pipefail
          pushd .tooling/zilf-glulx
          dotnet restore Zilf.sln --nologo 2>&1 | tee ../../glulx/build/state-persistence/zilf-restore.log
          dotnet build Zilf.sln --configuration Release --property:PortableTarget=true --no-restore --nologo \
            2>&1 | tee ../../glulx/build/state-persistence/zilf-build.log
          popd
          zilf_dll="$(find .tooling/zilf-glulx -path '*/bin/Release/*/zilf.dll' -print -quit)"
          test -n "$zilf_dll"
          echo "GLULX_ZILF_DLL=$(realpath "$zilf_dll")" >> "$GITHUB_ENV"

      - name: Build exactly pinned Glazer
        shell: bash
        run: |
          set -euxo pipefail
          curl --fail --location --silent --show-error "$GLAZER_SOURCE_URL" \
            --output glulx/build/state-persistence/glazer-source.tar.gz
          echo "$GLAZER_SOURCE_SHA256  glulx/build/state-persistence/glazer-source.tar.gz" | sha256sum --check
          mkdir -p .tooling/glazer-source
          tar -xf glulx/build/state-persistence/glazer-source.tar.gz --strip-components=1 -C .tooling/glazer-source
          make -C .tooling/glazer-source 2>&1 | tee glulx/build/state-persistence/glazer-build.log
          glazer_binary="$(find .tooling/glazer-source -type f -name glazer -perm -111 -print -quit)"
          test -n "$glazer_binary"
          echo "GLAZER_BIN=$(realpath "$glazer_binary")" >> "$GITHUB_ENV"
          "$glazer_binary" --version | tee glulx/build/state-persistence/glazer-version.txt
          grep -Fx "glazer 1.2.0" glulx/build/state-persistence/glazer-version.txt

      - name: Stage exact Release 1216 production source
        run: |
          python glulx/tools/stage_ritual_resonance.py \
            --upstream .upstream/zork1-glulx \
            --destination glulx/build/state-persistence/src \
            --allowed-root glulx/build/state-persistence \
            --manifest glulx/ritual-resonance/patch-series.json
          python optimized/tools/zil_smell_check.py \
            --source glulx/build/state-persistence/src \
            --json glulx/build/state-persistence/smell-report.json
          python - <<'PY'
          import json
          from pathlib import Path
          receipt = json.loads(Path('glulx/build/state-persistence/src/STAGING-RECEIPT.json').read_text(encoding='utf-8'))
          report = json.loads(Path('glulx/build/state-persistence/smell-report.json').read_text(encoding='utf-8'))
          assert receipt['changed_paths'] == [
              '1dungeon.zil', 'assistance.zil', 'ritual_resonance.zil',
              'shadow_logic.zil', 'zork1.zil',
          ]
          assert not report['errors']
          assert not [item for item in report['includes'] if not item['resolved']]
          source = Path('glulx/build/state-persistence/src')
          forbidden = (
              'PTROLL', 'UTROLL', 'RTROLL', 'PECAT', 'PEBRK', 'UEGG', 'REGG',
              'PDAM', 'UDAM', 'RDAM', 'PRITE', 'URITE', 'RRITE',
              'PTIMER', 'UTIMER', 'RTIMER', 'state_persistence_test',
          )
          production = '\n'.join(path.read_text(errors='ignore') for path in source.glob('*.zil'))
          assert not any(token in production for token in forbidden)
          PY

      - name: Compile and verify unchanged Release 1216 artifact
        shell: bash
        run: |
          set -euxo pipefail
          assembly="${GITHUB_WORKSPACE}/glulx/build/state-persistence/zork1-glulx-ritual-resonance.asm"
          pushd glulx/build/state-persistence/src
          dotnet "$GLULX_ZILF_DLL" build --glulx --stop-after-compile zork1.zil "$assembly" \
            2>&1 | tee "${GITHUB_WORKSPACE}/glulx/build/state-persistence/zilf-compile.log"
          popd
          python glulx/tools/normalize_serial.py "$assembly" \
            --serial "$RITUAL_SERIAL" \
            --receipt glulx/build/state-persistence/SERIAL-NORMALIZATION.json
          "$GLAZER_BIN" "$assembly" -o glulx/build/state-persistence/zork1-glulx-ritual-resonance.ulx \
            2>&1 | tee glulx/build/state-persistence/glazer-assemble.log
          python glulx/tools/verify_ulx.py glulx/build/state-persistence/zork1-glulx-ritual-resonance.ulx \
            --expect-sha256 "$RITUAL_SHA256" \
            --json glulx/build/state-persistence/story-report.json
          python - <<'PY'
          import json, os
          from pathlib import Path
          story = json.loads(Path('glulx/build/state-persistence/story-report.json').read_text(encoding='utf-8'))
          assert story['version_hex'] == '0x00030103'
          assert story['checksum_valid'] is True
          assert story['size_bytes'] == int(os.environ['RITUAL_SIZE'])
          assert story['checksum_hex'] == os.environ['RITUAL_CHECKSUM']
          assert story['sha256'] == os.environ['RITUAL_SHA256']
          PY

      - name: Build pinned native Glulxe with CheapGlk
        shell: bash
        run: |
          set -euxo pipefail
          make -C .tooling/cheapglk 2>&1 | tee glulx/build/state-persistence/cheapglk-build.log
          make -C .tooling/glulxe \
            GLKDIR="${GITHUB_WORKSPACE}/.tooling/cheapglk" \
            GLKLIB="${GITHUB_WORKSPACE}/.tooling/cheapglk/libcheapglk.a" \
            2>&1 | tee glulx/build/state-persistence/glulxe-build.log
          test -x .tooling/glulxe/glulxe
          echo "GLULXE_BIN=$(realpath .tooling/glulxe/glulxe)" >> "$GITHUB_ENV"

      - name: Build separate test-only persistence story
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf glulx/build/state-persistence/test-src
          cp -a glulx/build/state-persistence/src glulx/build/state-persistence/test-src
          cp glulx/state-persistence/tests/state_persistence_test.zil \
            glulx/build/state-persistence/test-src/state_persistence_test.zil
          python - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path('glulx/tools').resolve()))
          from stage_release120 import apply_patch
          apply_patch(
              Path('glulx/state-persistence/tests/001-include-state-persistence-test.json').resolve(),
              Path('glulx/build/state-persistence/test-src').resolve(),
          )
          PY
          assembly="${GITHUB_WORKSPACE}/glulx/build/state-persistence/zork1-glulx-state-persistence-test.asm"
          pushd glulx/build/state-persistence/test-src
          dotnet "$GLULX_ZILF_DLL" build --glulx --stop-after-compile zork1.zil "$assembly" \
            2>&1 | tee "${GITHUB_WORKSPACE}/glulx/build/state-persistence/test-zilf-compile.log"
          popd
          python glulx/tools/normalize_serial.py "$assembly" \
            --serial "$PERSIST_TEST_SERIAL" \
            --receipt glulx/build/state-persistence/TEST-SERIAL-NORMALIZATION.json
          "$GLAZER_BIN" "$assembly" -o glulx/build/state-persistence/zork1-glulx-state-persistence-test.ulx \
            2>&1 | tee glulx/build/state-persistence/test-glazer-assemble.log

      - name: Run real SAVE and RESTORE routes
        shell: bash
        run: |
          set -u
          story="$(realpath glulx/build/state-persistence/zork1-glulx-state-persistence-test.ulx)"
          commands_root="$(realpath glulx/state-persistence/tests)"
          checker="$(realpath glulx/state-persistence/tools/assert_ordered_transcript.py)"
          mkdir -p glulx/build/state-persistence/routes
          for route in troll egg_caught egg_broken dam ritual timer; do
            route_dir="${GITHUB_WORKSPACE}/glulx/build/state-persistence/routes/${route}"
            transcript="${GITHUB_WORKSPACE}/glulx/build/state-persistence/${route}-transcript.txt"
            rm -rf "$route_dir"
            mkdir -p "$route_dir"
            set +e
            (
              cd "$route_dir"
              timeout 45s "$GLULXE_BIN" "$story" < "${commands_root}/${route}_commands.txt"
            ) > "$transcript" 2>&1
            status=$?
            set -e
            echo "Glulxe route status: $status" >> "$transcript"
            python "$checker" "$transcript" "${commands_root}/${route}_expectations.txt"
            test "$(find "$route_dir" -maxdepth 1 -type f -size +0c | wc -l)" -ge 1
          done

      - name: Write state persistence qualification receipt
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          qualification = json.loads(Path('glulx/state-persistence/qualification.json').read_text(encoding='utf-8'))
          story = json.loads(Path('glulx/build/state-persistence/story-report.json').read_text(encoding='utf-8'))
          route_files = sorted(Path('glulx/build/state-persistence').glob('*-transcript.txt'))
          assert len(route_files) == 6
          receipt = {
              'qualification_status': 'qualified against real SAVE and RESTORE',
              'production_artifact': story,
              'production_source_changes': [],
              'routes': {name: 'passed' for name in qualification['routes']},
              'transcripts': [path.name for path in route_files],
              'save_files_created': True,
              'object_graph_restoration': 'passed',
              'global_and_property_restoration': 'passed',
              'interrupt_table_restoration': 'passed',
              'production_contains_test_setup': False,
          }
          Path('glulx/build/state-persistence/BUILD-RECEIPT.json').write_text(
              json.dumps(receipt, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload persistence evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zork1-glulx-state-persistence
          path: |
            glulx/build/state-persistence/zork1-glulx-ritual-resonance.ulx
            glulx/build/state-persistence/zork1-glulx-state-persistence-test.ulx
            glulx/build/state-persistence/story-report.json
            glulx/build/state-persistence/BUILD-RECEIPT.json
            glulx/build/state-persistence/SERIAL-NORMALIZATION.json
            glulx/build/state-persistence/TEST-SERIAL-NORMALIZATION.json
            glulx/build/state-persistence/src/STAGING-RECEIPT.json
            glulx/build/state-persistence/smell-report.json
            glulx/build/state-persistence/*-transcript.txt
            glulx/build/state-persistence/routes/**
            glulx/build/state-persistence/*-compile.log
            glulx/build/state-persistence/*-build.log
            glulx/build/state-persistence/glazer-version.txt
            glulx/state-persistence/qualification.json
          if-no-files-found: warn
